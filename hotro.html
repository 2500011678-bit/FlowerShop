            <p><i class="fa-solid fa-location-dot"></i> Địa chỉ: Bến Tre, Việt Nam</p>

                <textarea rows="6" placeholder="Nhập nội dung cần hỗ trợ"></textarea>

                <button type="submit" class="btn">Gửi</button>

            </form>

        </div>
